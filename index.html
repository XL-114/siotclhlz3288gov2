<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>彩色硬边画板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #1a1a1a;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        .canvas-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #2c2c2c;
            touch-action: none;
        }

        .canvas-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            will-change: transform;
            transform-origin: 0 0;
        }

        canvas {
            display: block;
            cursor: crosshair;
            background-color: white;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        /* 左侧笔刷大小调节 */
        .brush-slider-container {
            position: fixed;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(30,30,35,0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 12px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .brush-slider-label {
            color: white;
            font-size: 10px;
            font-weight: 500;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            opacity: 0.7;
        }

        input[type="range"][orient="vertical"] {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 16px;
            height: 160px;
            background: #3a3a40;
            border-radius: 10px;
            accent-color: #000000;
        }

        .brush-value {
            color: white;
            background: #000000aa;
            padding: 2px 6px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            min-width: 38px;
            backdrop-filter: blur(4px);
        }

        /* 右侧工具栏 */
        .toolbar-right {
            position: fixed;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(30,30,35,0.85);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .tool-btn {
            width: 40px;
            height: 40px;
            border-radius: 30px;
            background: rgba(20,20,25,0.7);
            border: 1px solid rgba(255,255,255,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }

        .tool-btn.active {
            background: #000000;
            border-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .tool-btn svg {
            width: 20px;
            height: 20px;
            stroke: white;
            stroke-width: 1.7;
            fill: none;
        }

        .tool-btn:active {
            transform: scale(0.94);
        }

        /* 颜色切换按钮 - 显示当前颜色 */
        .color-switch-btn {
            width: 40px;
            height: 40px;
            border-radius: 30px;
            background: #000000;
            border: 2px solid white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .color-switch-btn:active {
            transform: scale(0.92);
        }

        .separator {
            width: 80%;
            height: 1px;
            background: rgba(255,255,255,0.2);
            margin: 6px 0;
        }

        @media (max-width: 700px) {
            .tool-btn { width: 36px; height: 36px; }
            .tool-btn svg { width: 18px; height: 18px; }
            .color-switch-btn { width: 36px; height: 36px; }
            .brush-slider-container { left: 10px; padding: 10px 5px; }
            input[type="range"][orient="vertical"] { height: 130px; width: 14px; }
        }
    </style>
</head>
<body>

<div class="canvas-stage" id="canvasStage">
    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<!-- 左侧笔刷大小调节 -->
<div class="brush-slider-container">
    <div class="brush-slider-label">PX</div>
    <input type="range" id="brushSizeSlider" orient="vertical" min="1" max="100" value="3" step="1">
    <div class="brush-value" id="brushSizeValue">3px</div>
</div>

<!-- 右侧工具栏 -->
<div class="toolbar-right">
    <div class="tool-btn" id="penToolBtn" title="画笔">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />
        </svg>
    </div>
    <div class="tool-btn eraser" id="eraserToolBtn" title="橡皮擦">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none">
            <path d="M7 21h10M5 17l9-9 5 5-9 9-5-5z" stroke-linecap="round"/>
            <path d="M14 7l3 3" stroke-linecap="round"/>
        </svg>
    </div>
    <div class="separator"></div>
    <!-- 颜色切换按钮：点击切换下一种颜色 -->
    <div class="color-switch-btn" id="colorSwitchBtn" title="切换颜色"></div>
    <div class="separator"></div>
    <div class="tool-btn" id="saveToolBtn" title="保存">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
        </svg>
    </div>
</div>

<script>
    (function() {
        
        const CANVAS_W = 1080;
        const CANVAS_H = 4000;
        
        const canvas = document.getElementById('mainCanvas');
        const wrapper = document.getElementById('canvasWrapper');
        const stage = document.getElementById('canvasStage');
        
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        canvas.style.width = `${CANVAS_W}px`;
        canvas.style.height = `${CANVAS_H}px`;
        canvas.style.imageRendering = 'crisp-edges';
        canvas.style.imageRendering = 'pixelated';
        
        const ctx = canvas.getContext('2d');
        
        
        let strokes = [];
        
        
        let currentTool = 'pen';
        let penSize = 3;
        let eraserSize = 30;
        
        
        const colorList = ['#000000', '#FF3B30', '#FF9500', '#FFCC00', '#34C759', '#5AC8FA', '#007AFF', '#AF52DE'];
        let currentColorIndex = 0;  
        let currentColor = colorList[0];
        
        function getCurrentSize() {
            return currentTool === 'pen' ? penSize : eraserSize;
        }
        
        function getCurrentColor() {
            return currentTool === 'pen' ? currentColor : '#FFFFFF';
        }
        
        
        function updateColorButton() {
            const colorBtn = document.getElementById('colorSwitchBtn');
            if (colorBtn) {
                colorBtn.style.backgroundColor = currentColor;
                
                if (currentColor === '#000000') {
                    colorBtn.style.boxShadow = '0 0 0 1px rgba(255,255,255,0.3)';
                } else {
                    colorBtn.style.boxShadow = 'none';
                }
            }
        }
        
        
        function switchToNextColor() {
            currentColorIndex = (currentColorIndex + 1) % colorList.length;
            currentColor = colorList[currentColorIndex];
            updateColorButton();
            
            if (currentTool !== 'pen') {
                setActiveTool('pen');
            }
        }
        
        
        function redrawAllStrokes() {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            
            for (const stroke of strokes) {
                ctx.save();
                ctx.beginPath();
                ctx.strokeStyle = stroke.color;
                ctx.fillStyle = stroke.color;
                ctx.lineWidth = stroke.size;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                if (stroke.type === 'dot') {
                    ctx.beginPath();
                    ctx.arc(stroke.x, stroke.y, stroke.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                } 
                else if (stroke.type === 'line' && stroke.points.length >= 2) {
                    ctx.beginPath();
                    ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
                    for (let i = 1; i < stroke.points.length; i++) {
                        ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
                    }
                    ctx.stroke();
                }
                ctx.restore();
            }
        }
        
        function addDot(x, y) {
            strokes.push({
                type: 'dot',
                x: x,
                y: y,
                size: getCurrentSize(),
                color: getCurrentColor()
            });
            redrawAllStrokes();
        }
        
        let currentStrokePoints = [];
        function startStroke(x, y) {
            currentStrokePoints = [{ x, y }];
        }
        
        function addStrokePoint(x, y) {
            if (currentStrokePoints.length === 0) return;
            const last = currentStrokePoints[currentStrokePoints.length - 1];
            if (Math.hypot(last.x - x, last.y - y) < 1.5) return;
            currentStrokePoints.push({ x, y });
            ctx.save();
            ctx.beginPath();
            ctx.strokeStyle = getCurrentColor();
            ctx.lineWidth = getCurrentSize();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.moveTo(last.x, last.y);
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.restore();
        }
        
        function endStroke() {
            if (currentStrokePoints.length >= 2) {
                strokes.push({
                    type: 'line',
                    points: [...currentStrokePoints],
                    size: getCurrentSize(),
                    color: getCurrentColor()
                });
            } else if (currentStrokePoints.length === 1) {
                addDot(currentStrokePoints[0].x, currentStrokePoints[0].y);
            }
            currentStrokePoints = [];
        }
        
        
        let scale = 4.0;
        let tx = 0, ty = 0;
        const DEFAULT_SCALE = 4.0;
        const MAX_SCALE = 40.0;
        const MIN_SCALE = 0.5;
        
        function getScreenSize() {
            const rect = stage.getBoundingClientRect();
            return { width: rect.width, height: rect.height };
        }
        
        function clampTranslation() {
            const { width: screenW, height: screenH } = getScreenSize();
            const canvasDisplayW = CANVAS_W * scale;
            const canvasDisplayH = CANVAS_H * scale;
            
            if (canvasDisplayW <= screenW) {
                tx = (screenW - canvasDisplayW) / 2;
            } else {
                const minTx = screenW - canvasDisplayW;
                const maxTx = 0;
                tx = Math.min(maxTx, Math.max(minTx, tx));
            }
            
            if (canvasDisplayH <= screenH) {
                ty = (screenH - canvasDisplayH) / 2;
            } else {
                const minTy = screenH - canvasDisplayH;
                const maxTy = 0;
                ty = Math.min(maxTy, Math.max(minTy, ty));
            }
        }
        
        function applyTransform() {
            wrapper.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
        }
        
        function clampScaleAndTransform() {
            let newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale));
            if (newScale !== scale) {
                const { width: screenW, height: screenH } = getScreenSize();
                const centerX = screenW / 2;
                const centerY = screenH / 2;
                const oldScale = scale;
                const oldCanvasX = (centerX - tx) / oldScale;
                const oldCanvasY = (centerY - ty) / oldScale;
                scale = newScale;
                tx = centerX - oldCanvasX * scale;
                ty = centerY - oldCanvasY * scale;
            }
            clampTranslation();
            applyTransform();
        }
        
        function setDefaultView() {
            scale = DEFAULT_SCALE;
            const { width: screenW, height: screenH } = getScreenSize();
            const canvasDisplayW = CANVAS_W * scale;
            const canvasDisplayH = CANVAS_H * scale;
            tx = (screenW - canvasDisplayW) / 2;
            ty = (screenH - canvasDisplayH) / 2;
            clampTranslation();
            applyTransform();
        }
        
        function screenToCanvas(clientX, clientY) {
            const canvasX = (clientX - tx) / scale;
            const canvasY = (clientY - ty) / scale;
            return {
                x: Math.min(Math.max(0, canvasX), CANVAS_W),
                y: Math.min(Math.max(0, canvasY), CANVAS_H)
            };
        }
        
        let isDrawing = false;
        
        function onPointerStart(x, y) {
            const coord = screenToCanvas(x, y);
            startStroke(coord.x, coord.y);
            isDrawing = true;
        }
        
        function onPointerMove(x, y) {
            if (!isDrawing) return;
            const coord = screenToCanvas(x, y);
            addStrokePoint(coord.x, coord.y);
        }
        
        function onPointerEnd(x, y) {
            if (!isDrawing) return;
            const coord = screenToCanvas(x, y);
            if (currentStrokePoints.length === 0) {
                addDot(coord.x, coord.y);
            } else {
                endStroke();
            }
            isDrawing = false;
        }
        
        
        let activeGesture = null;
        let initialPinchDistance = 0;
        let initialScale = 1.0;
        let initialTx = 0, initialTy = 0;
        let initialPanCenter = { x: 0, y: 0 };
        
        function getTouchDistance(touches) {
            if (touches.length < 2) return 0;
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.hypot(dx, dy);
        }
        
        function getTwoFingerCenter(touches) {
            if (touches.length < 2) return null;
            return {
                x: (touches[0].clientX + touches[1].clientX) / 2,
                y: (touches[0].clientY + touches[1].clientY) / 2
            };
        }
        
        function onTouchStart(e) {
            e.preventDefault();
            const touches = e.touches;
            const count = touches.length;
            
            if (count === 1) {
                if (activeGesture === 'pinch') return;
                activeGesture = 'draw';
                onPointerStart(touches[0].clientX, touches[0].clientY);
            } 
            else if (count === 2) {
                activeGesture = 'pinch';
                initialPinchDistance = getTouchDistance(touches);
                const center = getTwoFingerCenter(touches);
                if (center) initialPanCenter = { x: center.x, y: center.y };
                initialScale = scale;
                initialTx = tx;
                initialTy = ty;
                if (isDrawing) {
                    isDrawing = false;
                    endStroke();
                }
            }
        }
        
        function onTouchMove(e) {
            e.preventDefault();
            const touches = e.touches;
            const count = touches.length;
            
            if (count === 2 && activeGesture === 'pinch') {
                const newDistance = getTouchDistance(touches);
                const newCenter = getTwoFingerCenter(touches);
                if (newCenter && initialPinchDistance > 0) {
                    let newScale = initialScale * (newDistance / initialPinchDistance);
                    newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));
                    const deltaX = newCenter.x - initialPanCenter.x;
                    const deltaY = newCenter.y - initialPanCenter.y;
                    
                    if (newScale !== scale || deltaX !== 0 || deltaY !== 0) {
                        const oldScale = initialScale;
                        const canvasX = (initialPanCenter.x - initialTx) / oldScale;
                        const canvasY = (initialPanCenter.y - initialTy) / oldScale;
                        let baseTx = initialPanCenter.x - canvasX * newScale;
                        let baseTy = initialPanCenter.y - canvasY * newScale;
                        tx = baseTx + deltaX;
                        ty = baseTy + deltaY;
                        scale = newScale;
                        clampTranslation();
                        applyTransform();
                        initialScale = scale;
                        initialTx = tx;
                        initialTy = ty;
                        initialPanCenter = { x: newCenter.x, y: newCenter.y };
                        initialPinchDistance = newDistance;
                    }
                }
                if (isDrawing) {
                    isDrawing = false;
                    endStroke();
                }
                return;
            }
            
            if (count === 1 && activeGesture === 'draw' && isDrawing) {
                onPointerMove(touches[0].clientX, touches[0].clientY);
            }
        }
        
        function onTouchEnd(e) {
            e.preventDefault();
            const remaining = e.touches.length;
            if (activeGesture === 'pinch') {
                if (remaining < 2) activeGesture = null;
                if (isDrawing) {
                    isDrawing = false;
                    endStroke();
                }
                return;
            }
            if (activeGesture === 'draw' && isDrawing) {
                const changed = e.changedTouches;
                if (changed.length > 0) {
                    onPointerEnd(changed[0].clientX, changed[0].clientY);
                } else {
                    onPointerEnd(0, 0);
                }
                if (remaining === 0) activeGesture = null;
                else if (remaining === 1 && !isDrawing) {
                    const touches = e.touches;
                    if (touches.length === 1) {
                        onPointerStart(touches[0].clientX, touches[0].clientY);
                        activeGesture = 'draw';
                    }
                } else {
                    activeGesture = null;
                }
            }
            if (remaining === 0) activeGesture = null;
        }
        
        
        let isMiddlePanning = false;
        let panStart = { x: 0, y: 0 };
        let startTx = 0, startTy = 0;
        
        function onMouseDown(e) {
            if (e.button === 1) {
                e.preventDefault();
                isMiddlePanning = true;
                panStart.x = e.clientX;
                panStart.y = e.clientY;
                startTx = tx;
                startTy = ty;
                if (isDrawing) {
                    isDrawing = false;
                    endStroke();
                }
                activeGesture = 'pan';
                return;
            }
            if (e.button === 0) {
                e.preventDefault();
                onPointerStart(e.clientX, e.clientY);
                activeGesture = 'draw';
            }
        }
        
        function onMouseMove(e) {
            if (isMiddlePanning && activeGesture === 'pan') {
                e.preventDefault();
                const dx = e.clientX - panStart.x;
                const dy = e.clientY - panStart.y;
                tx = startTx + dx;
                ty = startTy + dy;
                clampTranslation();
                applyTransform();
                return;
            }
            if (isDrawing && activeGesture === 'draw') {
                onPointerMove(e.clientX, e.clientY);
            }
        }
        
        function onMouseUp(e) {
            if (isMiddlePanning) {
                isMiddlePanning = false;
                activeGesture = null;
                e.preventDefault();
                return;
            }
            if (isDrawing) {
                onPointerEnd(e.clientX, e.clientY);
                activeGesture = null;
            }
        }
        
        function onMouseLeave(e) {
            if (isDrawing) {
                onPointerEnd(e.clientX, e.clientY);
                isDrawing = false;
            }
            if (isMiddlePanning) isMiddlePanning = false;
            activeGesture = null;
        }
        
        
        const penBtn = document.getElementById('penToolBtn');
        const eraserBtn = document.getElementById('eraserToolBtn');
        const saveBtn = document.getElementById('saveToolBtn');
        const sizeSlider = document.getElementById('brushSizeSlider');
        const sizeValue = document.getElementById('brushSizeValue');
        const colorSwitchBtn = document.getElementById('colorSwitchBtn');
        
        function setActiveTool(tool) {
            currentTool = tool;
            if (tool === 'pen') {
                penBtn.classList.add('active');
                eraserBtn.classList.remove('active');
                sizeSlider.value = penSize;
                sizeValue.innerText = penSize + 'px';
            } else {
                eraserBtn.classList.add('active');
                penBtn.classList.remove('active');
                sizeSlider.value = eraserSize;
                sizeValue.innerText = eraserSize + 'px';
            }
        }
        
        penBtn.addEventListener('click', () => setActiveTool('pen'));
        eraserBtn.addEventListener('click', () => setActiveTool('eraser'));
        
        sizeSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value, 10);
            if (currentTool === 'pen') {
                penSize = val;
            } else {
                eraserSize = val;
            }
            sizeValue.innerText = val + 'px';
        });
        
        colorSwitchBtn.addEventListener('click', () => {
            switchToNextColor();
        });
        
        saveBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            try {
                const dataURL = canvas.toDataURL('image/png');
                localStorage.setItem('vector_art_save', dataURL);
                saveBtn.style.transform = 'scale(0.94)';
                setTimeout(() => { saveBtn.style.transform = ''; }, 150);
            } catch(e) {}
        });
        
        function loadFromLocal() {
            const saved = localStorage.getItem('vector_art_save');
            if (saved) {
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
                    ctx.drawImage(img, 0, 0);
                    strokes = [];
                };
                img.src = saved;
            } else {
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            }
        }
        
        loadFromLocal();
        setActiveTool('pen');
        updateColorButton();
        setDefaultView();
        
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        canvas.addEventListener('touchstart', onTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onTouchMove, { passive: false });
        canvas.addEventListener('touchend', onTouchEnd);
        canvas.addEventListener('touchcancel', onTouchEnd);
        canvas.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        canvas.addEventListener('mouseleave', onMouseLeave);
        window.addEventListener('resize', () => {
            clampScaleAndTransform();
        });
    })();
</script>
</body>
</html>
